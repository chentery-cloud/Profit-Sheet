<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <title>P-Humans Profit Sheet</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <!-- 기본 스타일 -->
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #f4f6f9;
      margin: 0;
      padding: 0;
      color: #222;
    }

    header {
      background: #004790;
      color: white;
      padding: 16px;
      font-weight: 700;
      font-size: 18px;
    }

    main {
      max-width: 720px;
      margin: auto;
      padding: 16px;
    }

    section {
      background: white;
      border-radius: 10px;
      padding: 16px;
      margin-bottom: 16px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.05);
    }

    h3 {
      margin-top: 0;
      margin-bottom: 12px;
      font-size: 16px;
    }

    input, select, button {
      width: 100%;
      padding: 10px;
      margin-bottom: 8px;
      font-size: 14px;
      border-radius: 6px;
      border: 1px solid #dbe0e4;
    }

    button {
      background: #004790;
      color: white;
      font-weight: 700;
      cursor: pointer;
      border: none;
    }

    button:hover {
      background: #005eb8;
    }

    ul {
      list-style: none;
      padding: 0;
      margin: 0;
      font-size: 13px;
    }

    li {
      padding: 8px 0;
      border-bottom: 1px solid #e5e7eb;
    }

    .type-income { color: #059669; font-weight: 600; }
    .type-expense { color: #dc2626; font-weight: 600; }

    .amount {
      float: right;
      font-weight: 700;
    }
  </style>
</head>
<body>

<header>
  📊 P-Humans Profit Sheet
</header>

<main>

  <!-- ✅ 입력 영역 -->
  <section>
    <h3>내역 추가</h3>

    <input type="date" id="date" />

    <select id="type">
      <option value="수입">수입</option>
      <option value="지출">지출</option>
    </select>

    <input type="text" id="category" placeholder="카테고리 (예: 노무비, 차량유류)" />
    <input type="number" id="amount" placeholder="금액" />

    <input type="text" id="memo" placeholder="메모 (선택)" />

    <button id="saveBtn">저장</button>
  </section>

  <!-- ✅ 목록 영역 -->
  <section>
    <h3>내역 목록</h3>
    <ul id="dataList"></ul>
  </section>

</main>

<!-- ✅ JS는 항상 body 맨 아래 -->
<script src="script.js"></script>

</body>
</html>
