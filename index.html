<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <title>월별 손익 대시보드</title>
  <style>
    body { font-family: Arial, sans-serif; margin: 20px; }
    button { margin-right: 6px; padding: 6px 10px; }
    table { border-collapse: collapse; width: 100%; margin-top: 10px; }
    th, td { border: 1px solid #ccc; padding: 6px; text-align: right; }
    th { background: #f5f5f5; }
    td:first-child, th:first-child { text-align: center; }
    .edit-box input { width: 80px; }
    .muted { color: #777; font-size: 12px; }
  </style>
</head>
<body>

<h2>월별 손익 대시보드 <span class="muted">(단위: 백만원)</span></h2>

<!-- ✅ 섹션 탭 -->
<div>
  <button onclick="setMode('group')">그룹합계</button>
  <button onclick="setMode('광양사무지원')">광양사무지원</button>
  <button onclick="setMode('광양총무지원')">광양총무지원</button>
  <button onclick="setMode('광양차량지원')">광양차량지원</button>
</div>

<br>

<table id="dataTable">
  <thead>
    <tr>
      <th>월</th>
      <th>매출</th>
      <th>원가</th>
      <th>매출총이익</th>
      <th>판관비</th>
      <th>영업이익</th>
      <th>관리</th>
    </tr>
  </thead>
  <tbody></tbody>
</table>

<script>
/* ===============================
   ✅ 설정값
================================ */
const API_URL = "https://script.google.com/macros/s/AKfycbwdx3Wjm43IIGjhutF30SC5P2ZVIyS7WWQhhULXNQc5gEvzEHkUmdSixs1TbyM-5wzDjg/exec"; // ← 교체 필수
const currentYear = "2026";

let baseData = {};
let currentSection = "group";

/* ===============================
   ✅ Google Sheet 데이터 조회
================================ */
async function fetchRecords() {
  const res = await fetch(API_URL);
  return await res.json();
}

/* ===============================
   ✅ Sheet → 내부 데이터 변환
================================ */
function buildBaseDataFromSheet(records, year) {
  const makeEmpty = () =>
    Array.from({ length: 12 }, (_, i) => ({
      month: `${i + 1}월`,
      sales: 0, cogs: 0, gp: 0, sga: 0, op: 0,
      cogs_labor: 0, cogs_exp: 0,
      sga_labor: 0, sga_exp: 0
    }));

  const data = {
    "광양사무지원": makeEmpty(),
    "광양총무지원": makeEmpty(),
    "광양차량지원": makeEmpty()
  };

  records.forEach(r => {
    if (!r["년월"] || !r["년월"].startsWith(year)) return;
    if (!data[r["섹션"]]) return;

    const m = Number(r["년월"].slice(5, 7)) - 1;

    const t = data[r["섹션"]][m];

    t.sales += Number(r["매출액"] || 0);
    t.cogs_labor += Number(r["원가-노무비"] || 0);
    t.cogs_exp += Number(r["원가-경비"] || 0);
    t.sga_labor += Number(r["판관-급여"] || 0);
    t.sga_exp += Number(r["판관-경비"] || 0);
  });

  Object.values(data).forEach(months => {
    months.forEach(m => {
      m.cogs = m.cogs_labor + m.cogs_exp;
      m.gp = m.sales - m.cogs;
      m.sga = m.sga_labor + m.sga_exp;
      m.op = m.gp - m.sga;
    });
  });

  return data;
}

/* ===============================
   ✅ 그룹합계 계산
================================ */
function getGroupData() {
  const result = Array.from({ length: 12 }, (_, i) => ({
    month: `${i + 1}월`,
    sales: 0, cogs: 0, gp: 0, sga: 0, op: 0
  }));

  Object.values(baseData).forEach(section => {
    section.forEach((m, i) => {
      result[i].sales += m.sales;
      result[i].cogs += m.cogs;
      result[i].gp += m.gp;
      result[i].sga += m.sga;
      result[i].op += m.op;
    });
  });

  return result;
}

/* ===============================
   ✅ 화면 렌더링
================================ */
function setMode(section) {
  currentSection = section;
  updateDashboard();
}

function updateDashboard() {
  const tbody = document.querySelector("#dataTable tbody");
  tbody.innerHTML = "";

  const rows = currentSection === "group"
    ? getGroupData()
    : baseData[currentSection];

  rows.forEach((r, idx) => {
    const tr = document.createElement("tr");

    tr.innerHTML = `
      <td>${r.month}</td>
      <td>${r.sales}</td>
      <td>${r.cogs}</td>
      <td>${r.gp}</td>
      <td>${r.sga}</td>
      <td>${r.op}</td>
      <td>
        ${currentSection !== "group"
          ? `<button onclick="openEdit(${idx})">입력</button>`
          : ""}
      </td>
    `;
    tbody.appendChild(tr);

    if (currentSection !== "group") {
      const edit = document.createElement("tr");
      edit.style.display = "none";
      edit.id = `edit-${idx}`;
      edit.innerHTML = `
        <td colspan="7">
          <div class="edit-box">
            매출 <input><br>
            원가-노무 <input><br>
            원가-경비 <input><br>
            판관-급여 <input><br>
            판관-경비 <input><br>
            <button onclick="saveEdit(${idx})">저장</button>
          </div>
        </td>
      `;
      tbody.appendChild(edit);
    }
  });
}

/* ===============================
   ✅ 관리자 입력
================================ */
function openEdit(idx) {
  const row = document.getElementById(`edit-${idx}`);
  row.style.display = row.style.display === "none" ? "table-row" : "none";
}

async function saveEdit(idx) {
  const inputs = document
    .querySelector(`#edit-${idx}`)
    .querySelectorAll("input");

  const payload = {
    yearMonth: `${currentYear}-${String(idx + 1).padStart(2, "0")}`,
    section: currentSection,   // ✅ 자동 섹션 반영
    sales: Number(inputs[0].value || 0),
    cogsLabor: Number(inputs[1].value || 0),
    cogsExp: Number(inputs[2].value || 0),
    sgaLabor: Number(inputs[3].value || 0),
    sgaExp: Number(inputs[4].value || 0)
  };

  await fetch(API_URL, {
    method: "POST",
    body: JSON.stringify(payload)
  });

  alert("구글 시트에 저장되었습니다.");

  const records = await fetchRecords();
  baseData = buildBaseDataFromSheet(records, currentYear);
  updateDashboard();
}

/* ===============================
   ✅ 초기 로딩
================================ */
window.onload = async () => {
  const records = await fetchRecords();
  baseData = buildBaseDataFromSheet(records, currentYear);
  setMode("group");
};
</script>

</body>
</html>
